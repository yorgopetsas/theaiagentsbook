{% extends "base.html" %}

{% block content %}
  {% if page.slug == 'about-the-author' and AUTHOR_PHOTO %}
    <div class="not-prose mx-auto mb-10 max-w-4xl md:mb-12">
      <div class="flex flex-col items-center gap-6 sm:flex-row sm:items-center sm:gap-8">
        <div class="relative shrink-0">
          <div class="absolute -inset-0.5 rounded-full bg-gradient-to-br from-indigo-500/40 to-violet-500/30 blur-sm" aria-hidden="true"></div>
          <img
            src="{{ AUTHOR_PHOTO }}"
            alt="Yorgo Petsas"
            class="relative h-36 w-36 rounded-full object-cover shadow-xl ring-2 ring-white/10 sm:h-44 sm:w-44"
            width="176"
            height="176"
            loading="eager"
            decoding="async"
          />
        </div>
        <div class="text-center sm:text-left">
          <p class="text-[11px] font-semibold uppercase tracking-[0.22em] text-indigo-400">About the author</p>
          <p class="font-display mt-2 text-2xl font-bold tracking-tight text-white sm:text-3xl">Yorgo Petsas</p>
          <p class="mt-2 text-sm text-slate-400">Head of eCommerce Digital Innovation · Barcelona</p>
        </div>
      </div>
    </div>
  {% endif %}
  <div
    class="book-prose prose prose-invert prose-slate mx-auto max-w-4xl text-slate-300
      prose-headings:font-display prose-headings:font-semibold prose-headings:tracking-tight
      prose-h2:scroll-mt-28 prose-h2:mt-14 prose-h2:mb-8 prose-h2:border-b prose-h2:border-indigo-500/45 prose-h2:pb-4 prose-h2:text-xl prose-h2:leading-snug prose-h2:text-white md:prose-h2:mt-16 md:prose-h2:text-[1.4rem]
      prose-h2:first:mt-0
      prose-h3:scroll-mt-28 prose-h3:mt-12 prose-h3:mb-5 prose-h3:rounded-xl prose-h3:border prose-h3:border-white/12 prose-h3:border-l-[4px] prose-h3:border-l-indigo-500 prose-h3:bg-gradient-to-br prose-h3:from-white/[0.07] prose-h3:to-indigo-950/30 prose-h3:px-5 prose-h3:py-4 prose-h3:shadow-lg prose-h3:shadow-black/25 prose-h3:ring-1 prose-h3:ring-inset prose-h3:ring-white/[0.06] prose-h3:text-base prose-h3:font-semibold prose-h3:leading-snug prose-h3:text-slate-50 md:prose-h3:text-lg
      prose-p:mb-4 prose-p:leading-relaxed
      prose-strong:text-white
      prose-hr:my-12 prose-hr:border-white/20
      prose-a:text-indigo-400 hover:prose-a:underline"
  >
    {{ page.content | sectionize_book_content | add_nofollow_howaiagentswork }}
  </div>
{% endblock %}
