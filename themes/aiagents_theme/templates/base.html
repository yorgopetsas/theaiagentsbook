<!doctype html>
<html lang="{{ (page.lang if page is defined and page.lang else (article.lang if article is defined and article.lang else 'en')) }}" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..600&family=Plus+Jakarta+Sans:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />

    <title>{% if page is defined and page.title %}{{ page.title }} · {% elif article is defined and article.title %}{{ article.title }} · {% endif %}{{ SITENAME }}</title>

    <meta name="description" content="{{ (page.summary if page is defined and page.summary else (article.summary if article is defined and article.summary else '')) }}" />

    {% if GA4_MEASUREMENT_ID %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA4_MEASUREMENT_ID }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ GA4_MEASUREMENT_ID }}');
      </script>
    {% endif %}

    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Plus Jakarta Sans", "Inter", "system-ui", "sans-serif"],
            },
            backgroundImage: {
              "grid-faint":
                "linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      (function () {
        const root = document.documentElement;
        const saved = localStorage.getItem("theme");
        var shouldUseDark = true;
        if (saved === "light") shouldUseDark = false;
        else if (saved === "dark") shouldUseDark = true;
        if (shouldUseDark) root.classList.add("dark");

        window.__toggleTheme = function () {
          root.classList.toggle("dark");
          const isDark = root.classList.contains("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
        };
      })();
    </script>
  </head>

  <body class="relative min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-[#06060a] dark:text-slate-200">
    <!-- Dark: ambient mesh + grid. Light: minimal wash. -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden dark:block hidden" aria-hidden="true">
      <div class="absolute -top-32 left-[10%] h-[28rem] w-[28rem] rounded-full bg-indigo-600/25 blur-[120px]"></div>
      <div class="absolute top-1/4 right-[-5%] h-[22rem] w-[22rem] rounded-full bg-violet-600/20 blur-[100px]"></div>
      <div class="absolute bottom-[-5%] left-1/3 h-[20rem] w-[20rem] rounded-full bg-cyan-500/15 blur-[90px]"></div>
      <div class="absolute inset-0 bg-grid-faint bg-[length:72px_72px] [mask-image:radial-gradient(ellipse_80%_60%_at_50%_20%,black,transparent)]"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#06060a]/40 to-[#06060a]"></div>
    </div>
    <div class="pointer-events-none fixed inset-0 -z-10 bg-gradient-to-b from-slate-100 to-white dark:hidden" aria-hidden="true"></div>

    <a class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-indigo-600 focus:px-4 focus:py-2 focus:text-white" href="#content">
      Skip to content
    </a>

    <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/75 backdrop-blur-xl dark:border-white/10 dark:bg-[#06060a]/75">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3.5 md:px-6">
        <a href="/en/" class="group flex items-center gap-3">
          <div class="relative flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 via-violet-500 to-cyan-400 p-[1px] shadow-lg shadow-indigo-500/25">
            <div class="flex h-full w-full items-center justify-center rounded-[0.9rem] bg-[#0c0c12] text-sm font-bold text-white dark:bg-[#0a0a10]">AI</div>
          </div>
          <div>
            <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-indigo-600 dark:text-indigo-400">AI Agents</div>
            <div class="font-display text-sm font-semibold leading-tight text-slate-900 dark:text-white">{{ SITENAME }}</div>
          </div>
        </a>

        <div class="flex items-center gap-2 sm:gap-3">
          <a
            href="https://howaiagentswork.com/en/"
            class="hidden rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm transition hover:border-indigo-300 hover:text-indigo-700 sm:inline-flex dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:border-indigo-400/40 dark:hover:text-white"
          >
            Chapter fragments →
          </a>
          <nav class="flex items-center gap-1 rounded-full border border-slate-200 bg-white/90 p-0.5 text-xs font-medium dark:border-white/10 dark:bg-white/5">
            <a class="rounded-full px-3 py-1.5 text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-white/10 dark:hover:text-white" href="/en/">EN</a>
            <a class="rounded-full px-3 py-1.5 text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-white/10 dark:hover:text-white" href="/es/">ES</a>
          </nav>

          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:bg-white/10"
            onclick="window.__toggleTheme && window.__toggleTheme()"
            aria-label="Toggle light or dark appearance"
            title="Toggle appearance"
          >
            <span class="hidden dark:inline" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
            </span>
            <span class="dark:hidden" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main id="content" class="mx-auto max-w-6xl px-4 py-12 md:px-6 md:py-20">
      {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-6xl px-4 pb-12 md:px-6">
      <div class="flex flex-col gap-6 border-t border-slate-200/80 pt-8 dark:border-white/10 md:flex-row md:items-center md:justify-between">
        <div>
          <div class="font-display text-sm font-semibold text-slate-900 dark:text-white">{{ SITENAME }}</div>
          <p class="mt-1 text-xs text-slate-500 dark:text-slate-500">Theory, build track, and practical AI agents—on your machine.</p>
        </div>
        <div class="flex flex-wrap items-center gap-4 text-sm text-slate-600 dark:text-slate-400">
          <a class="hover:text-indigo-600 dark:hover:text-indigo-400" href="/en/">English</a>
          <a class="hover:text-indigo-600 dark:hover:text-indigo-400" href="/es/">Español</a>
          <a class="hover:text-indigo-600 dark:hover:text-indigo-400" href="https://howaiagentswork.com/en/">Fragments</a>
        </div>
        <div class="text-xs text-slate-500 dark:text-slate-500">© 2026</div>
      </div>
    </footer>
  </body>
</html>
