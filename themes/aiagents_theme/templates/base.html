<!doctype html>
<html lang="{{ (page.lang if page is defined and page.lang else (article.lang if article is defined and article.lang else 'en')) }}" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..600&display=swap" rel="stylesheet" />

    <title>
      {% if page is defined and page.title %}{{ page.title }} - {% endif %}
      {% if article is defined and article.title %}{{ article.title }} - {% endif %}
      {{ SITENAME }}
    </title>

    <meta name="description" content="{{ (page.summary if page is defined and page.summary else (article.summary if article is defined and article.summary else '')) }}" />

    {% if GA4_MEASUREMENT_ID %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA4_MEASUREMENT_ID }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ GA4_MEASUREMENT_ID }}');
      </script>
    {% endif %}

    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      (function () {
        const root = document.documentElement;
        const saved = localStorage.getItem("theme");
        // Default: dark. Only use light if the user explicitly chose it before.
        var shouldUseDark = true;
        if (saved === "light") shouldUseDark = false;
        else if (saved === "dark") shouldUseDark = true;
        if (shouldUseDark) root.classList.add("dark");

        window.__toggleTheme = function () {
          root.classList.toggle("dark");
          const isDark = root.classList.contains("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
        };
      })();
    </script>
  </head>

  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <a class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 bg-slate-900 text-white px-3 py-2 rounded" href="#content">
      Skip to content
    </a>

    <header class="sticky top-0 z-40 border-b border-slate-200/70 bg-white/80 backdrop-blur dark:border-slate-800/80 dark:bg-slate-950/85">
      <div class="mx-auto max-w-5xl px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center text-white font-semibold">
            AI
          </div>
          <div>
            <div class="text-sm text-slate-600 dark:text-slate-400">AI Agents</div>
            <div class="font-semibold leading-tight">{{ SITENAME }}</div>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <nav class="hidden sm:flex items-center gap-3 text-sm">
            <a class="hover:underline underline-offset-4" href="/en/">EN</a>
            <a class="hover:underline underline-offset-4" href="/es/">ES</a>
          </nav>

          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
            onclick="window.__toggleTheme && window.__toggleTheme()"
            aria-label="Toggle light or dark appearance"
            title="Toggle appearance"
          >
            <span class="hidden dark:inline" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
            </span>
            <span class="dark:hidden" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main id="content" class="mx-auto max-w-5xl px-4 py-12 md:px-6 md:py-16">
      {% block content %}{% endblock %}
    </main>

    <footer class="mx-auto max-w-5xl px-4 pb-10 text-sm text-slate-600 dark:text-slate-400">
      <div class="border-t border-slate-200/70 pt-6 dark:border-slate-800/80">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>© 2026 {{ SITENAME }}</div>
          <div class="flex items-center gap-3">
            <a class="hover:underline underline-offset-4" href="/en/">EN</a>
            <a class="hover:underline underline-offset-4" href="/es/">ES</a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
