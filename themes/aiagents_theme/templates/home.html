{% extends "base.html" %}

{% block content %}
  <div class="max-w-4xl">
    {% if page.title %}
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-50">
        {{ page.title }}
      </h1>
    {% endif %}

    {% if page.summary %}
      <p class="mt-4 text-lg text-slate-600 dark:text-slate-300">
        {{ page.summary }}
      </p>
    {% endif %}

    <div class="prose prose-slate prose-lg dark:prose-invert max-w-none mt-10 prose-headings:scroll-mt-24 prose-a:text-indigo-600 prose-a:no-underline hover:prose-a:underline dark:prose-a:text-indigo-400">
      {{ page.content }}
    </div>
  </div>
{% endblock %}
