{% extends "base.html" %}

{% block content %}
  <div class="mx-auto max-w-3xl">
    {% if page.title %}
      <header class="not-prose mb-12 border-b border-slate-200/90 pb-10 dark:border-slate-800/90">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-600 dark:text-indigo-400">
          Book + build track
        </p>
        <h1 class="mt-3 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl dark:text-slate-50">
          {{ page.title }}
        </h1>
        {% if page.summary %}
          <p class="mt-5 text-lg leading-relaxed text-slate-600 dark:text-slate-400">
            {{ page.summary }}
          </p>
        {% endif %}
      </header>
    {% endif %}

    <article
      class="prose prose-slate max-w-none dark:prose-invert
        prose-headings:scroll-mt-24 prose-headings:font-semibold prose-headings:tracking-tight
        prose-h2:mt-14 prose-h2:mb-5 prose-h2:border-b prose-h2:border-slate-200/90 prose-h2:pb-3 prose-h2:text-xl prose-h2:leading-snug prose-h2:text-slate-900 dark:prose-h2:border-slate-700/90 dark:prose-h2:text-slate-50
        prose-h2:first:mt-0 prose-h2:first:border-0 prose-h2:first:pb-0
        prose-h3:mt-10 prose-h3:mb-3 prose-h3:border-l-2 prose-h3:border-indigo-500/70 prose-h3:pl-4 prose-h3:text-xl prose-h3:font-semibold prose-h3:leading-snug prose-h3:text-slate-800 dark:prose-h3:border-indigo-400/60 dark:prose-h3:text-slate-100
        prose-p:mb-4 prose-p:leading-relaxed prose-p:text-[1.05rem] prose-p:text-slate-700 dark:prose-p:text-slate-300
        prose-strong:font-semibold prose-strong:text-slate-900 dark:prose-strong:text-slate-100
        prose-ul:my-5 prose-ul:space-y-2 prose-li:marker:text-indigo-500 dark:prose-li:marker:text-indigo-400
        prose-li:leading-relaxed
        prose-hr:my-12 prose-hr:border-slate-300 dark:prose-hr:border-slate-600
        prose-a:text-indigo-600 prose-a:font-medium prose-a:no-underline hover:prose-a:underline dark:prose-a:text-indigo-400
        prose-table:block prose-table:overflow-x-auto prose-table:rounded-lg prose-table:border prose-table:border-slate-200 dark:prose-table:border-slate-700
        prose-thead:bg-slate-100 dark:prose-thead:bg-slate-800/80
        prose-th:text-left prose-th:px-4 prose-th:py-3 prose-th:text-sm prose-th:font-semibold
        prose-td:px-4 prose-td:py-3 prose-td:text-sm prose-td:align-top
        prose-tr:border-b prose-tr:border-slate-200 dark:prose-tr:border-slate-700/80
    ">
      {{ page.content }}
    </article>
  </div>
{% endblock %}
