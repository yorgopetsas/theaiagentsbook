{% extends "base.html" %}

{% block content %}
  <div class="max-w-3xl">
    {% if page.title %}
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">
        {{ page.title }}
      </h1>
    {% endif %}

    {% if page.summary %}
      <p class="mt-4 text-lg text-slate-700 dark:text-slate-300">
        {{ page.summary }}
      </p>
    {% endif %}

    <div class="prose prose-slate dark:prose-invert max-w-none mt-8">
      {{ page.content }}
    </div>
  </div>
{% endblock %}
