<!doctype html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..600&family=Plus+Jakarta+Sans:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />

    <title>The AI Agents Book</title>

    <meta name="description" content="" />


    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Plus Jakarta Sans", "Inter", "system-ui", "sans-serif"],
            },
            backgroundImage: {
              "grid-faint":
                "linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      document.documentElement.classList.add("dark");
    </script>
  </head>

  <body class="relative min-h-screen bg-[#06060a] font-sans text-slate-200 antialiased">
    <!-- Ambient mesh + grid (always on — site is dark-only) -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden" aria-hidden="true">
      <div class="absolute -top-32 left-[10%] h-[28rem] w-[28rem] rounded-full bg-indigo-600/25 blur-[120px]"></div>
      <div class="absolute top-1/4 right-[-5%] h-[22rem] w-[22rem] rounded-full bg-violet-600/20 blur-[100px]"></div>
      <div class="absolute bottom-[-5%] left-1/3 h-[20rem] w-[20rem] rounded-full bg-cyan-500/15 blur-[90px]"></div>
      <div class="absolute inset-0 bg-grid-faint bg-[length:72px_72px] [mask-image:radial-gradient(ellipse_80%_60%_at_50%_20%,black,transparent)]"></div>
      <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#06060a]/40 to-[#06060a]"></div>
    </div>

    <a class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-indigo-600 focus:px-4 focus:py-2 focus:text-white" href="#content">
      Skip to content
    </a>

    <header class="sticky top-0 z-40 border-b border-white/10 bg-[#06060a]/80 backdrop-blur-xl">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3.5 md:px-6">
        <a href="/en/" class="group flex items-center gap-3" aria-label="The AI Agents Book home">
          <div class="relative flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 via-violet-500 to-cyan-400 p-[1px] shadow-lg shadow-indigo-500/25 transition group-hover:shadow-indigo-500/40">
            <div class="flex h-full w-full items-center justify-center rounded-[0.9rem] bg-[#0a0a10]">
              <!-- Logo mark: agent loop + connected nodes (replace with your SVG when ready) -->
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="12" r="2.5" fill="#22d3ee" />
                <circle cx="6" cy="8" r="1.8" fill="#818cf8" />
                <circle cx="18" cy="8" r="1.8" fill="#a78bfa" />
                <circle cx="6" cy="16" r="1.8" fill="#a78bfa" />
                <circle cx="18" cy="16" r="1.8" fill="#818cf8" />
                <path d="M7.5 8.8L10.5 11M16.5 8.8L13.5 11M7.5 15.2L10.5 13M16.5 15.2L13.5 13M12 14.5v-3" stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round" />
              </svg>
            </div>
          </div>
          <div>
            <div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-indigo-400">AI Agents</div>
            <div class="font-display text-sm font-semibold leading-tight text-white">The AI Agents Book</div>
          </div>
        </a>

        <div class="flex items-center gap-2 sm:gap-3">
          <a
            href="https://howaiagentswork.com/en/"
            rel="nofollow noopener noreferrer"
            class="hidden rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-xs font-medium text-slate-200 shadow-sm transition hover:border-indigo-400/40 hover:text-white sm:inline-flex"
          >
            Chapter fragments →
          </a>
          <nav class="flex items-center gap-1 rounded-full border border-white/10 bg-white/5 p-0.5 text-xs font-medium">
            <a class="rounded-full px-3 py-1.5 text-slate-400 transition hover:bg-white/10 hover:text-white" href="/en/">EN</a>
            <a class="rounded-full px-3 py-1.5 text-slate-400 transition hover:bg-white/10 hover:text-white" href="/es/">ES</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="content" class="mx-auto max-w-6xl px-4 py-12 pb-28 md:px-6 md:py-20 md:pb-20">
    <h2>Tags for The AI Agents Book</h2>
    <ul>
    </ul>
    </main>

    <!-- Mobile sticky CTA (hidden on lg+) -->
    <div
      class="fixed bottom-0 left-0 right-0 z-50 border-t border-white/10 bg-[#06060a]/95 pb-[env(safe-area-inset-bottom)] backdrop-blur-xl lg:hidden"
      role="region"
      aria-label="Quick link to chapter fragments"
    >
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
        <div class="min-w-0">
          <p class="truncate text-xs font-medium text-white">Chapter fragments</p>
          <p class="truncate text-[11px] text-slate-500">howaiagentswork.com</p>
        </div>
        <a
          href="https://howaiagentswork.com/en/"
          rel="nofollow noopener noreferrer"
          class="inline-flex shrink-0 items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/25"
        >
          Read →
        </a>
      </div>
    </div>

    <footer class="mx-auto max-w-6xl px-4 pb-12 md:px-6 lg:pb-12">
      <div class="flex flex-col gap-6 border-t border-white/10 pt-8 md:flex-row md:items-center md:justify-between">
        <div>
          <div class="font-display text-sm font-semibold text-white">The AI Agents Book</div>
          <p class="mt-1 text-xs text-slate-500">Theory, build track, and practical AI agents—on your machine.</p>
        </div>
        <div class="flex flex-wrap items-center gap-4 text-sm text-slate-400">
          <a class="hover:text-indigo-400" href="/en/">English</a>
          <a class="hover:text-indigo-400" href="/es/">Español</a>
          <a class="hover:text-indigo-400" href="https://howaiagentswork.com/en/" rel="nofollow noopener noreferrer">Fragments</a>
        </div>
        <div class="text-xs text-slate-500">© 2026</div>
      </div>
    </footer>

    <style>
      /* Step blocks (###): tuck first paragraph under the heading card */
      .book-prose h3 + p {
        margin-top: 0.625rem;
      }

      /* Major h2 regions: separate “chapters” inside the article */
      .book-prose .content-section {
        margin-bottom: 2rem;
      }
      .book-prose .content-section:last-child {
        margin-bottom: 0;
      }
      .book-prose .content-section-lead {
        padding: 1.25rem 1.25rem 1.5rem;
        border-radius: 1rem;
        border: 1px dashed rgba(99, 102, 241, 0.35);
        background: linear-gradient(
          165deg,
          rgba(99, 102, 241, 0.08) 0%,
          rgba(6, 6, 10, 0.4) 100%
        );
      }
      .book-prose .content-section-block {
        padding: 1.5rem 1.35rem 1.75rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(6, 6, 10, 0.55) 100%
        );
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 12px 40px -12px rgba(0, 0, 0, 0.45);
      }
      .book-prose .content-section-block > h2:first-child {
        margin-top: 0 !important;
      }
      /* Build track: intro block before Step 0 */
      .book-prose .content-section-build-intro {
        padding: 1.5rem 1.35rem 1.75rem;
        margin-bottom: 1.5rem;
        border-radius: 1rem;
        border: 1px solid rgba(99, 102, 241, 0.28);
        background: linear-gradient(
          145deg,
          rgba(99, 102, 241, 0.1) 0%,
          rgba(6, 6, 10, 0.5) 100%
        );
      }
      .book-prose .content-section-build-intro > h2:first-child {
        margin-top: 0 !important;
      }
      /* One panel per step (jump targets from nav) */
      .book-prose .content-section-step {
        padding: 1.35rem 1.25rem 1.6rem;
        margin-bottom: 1.35rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(8, 8, 14, 0.65);
        box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.12) inset;
      }
      .book-prose .content-section-step:last-child {
        margin-bottom: 0;
      }
      .book-prose .content-section-step > h3:first-child {
        margin-top: 0 !important;
        margin-bottom: 1rem !important;
        border-left-width: 3px;
        padding-top: 0.65rem;
        padding-bottom: 0.65rem;
        box-shadow: none;
        background: linear-gradient(
          90deg,
          rgba(99, 102, 241, 0.12) 0%,
          rgba(255, 255, 255, 0.03) 100%
        );
      }
      .book-prose .content-section-step hr {
        margin-top: 1.25rem;
        margin-bottom: 0;
        opacity: 0.5;
      }
    </style>
  </body>
</html>
