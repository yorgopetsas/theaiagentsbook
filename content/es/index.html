<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>El Libro de Agentes de IA (ES)</title>

    <script>
      tailwind = window.tailwind || {};
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      (function () {
        const root = document.documentElement;
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const shouldUseDark = saved ? saved === "dark" : prefersDark;
        if (shouldUseDark) root.classList.add("dark");

        window.__toggleTheme = function () {
          root.classList.toggle("dark");
          const isDark = root.classList.contains("dark");
          localStorage.setItem("theme", isDark ? "dark" : "light");
        };
      })();
    </script>
  </head>

  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <main class="mx-auto max-w-5xl px-4 py-10">
      <div class="flex items-center justify-between gap-4">
        <div>
          <div class="text-sm text-slate-600 dark:text-slate-400">AI Agents</div>
          <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">El Libro de Agentes de IA</h1>
          <p class="mt-3 text-lg text-slate-700 dark:text-slate-300">
            Entiende agentes, construye un agente local y extrae conclusiones prácticas.
          </p>
        </div>
        <a
          href="/en/"
          class="rounded-lg border border-slate-200 px-3 py-2 text-sm dark:border-slate-800 bg-slate-50 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800"
        >
          EN
        </a>
      </div>

      <div class="mt-8 rounded-2xl border border-slate-200/70 bg-white/70 p-6 dark:border-slate-800/70 dark:bg-slate-900/30">
        <p class="text-lg text-slate-700 dark:text-slate-300">Traducciones al español: pronto.</p>
        <p class="mt-3 text-sm text-slate-600 dark:text-slate-400">
          Mientras tanto, puedes leer los fragmentos en inglés en:
          <a class="underline underline-offset-4 hover:opacity-80" href="https://howaiagentswork.com/en/">https://howaiagentswork.com/en/</a>
        </p>
      </div>
    </main>
  </body>
</html>
